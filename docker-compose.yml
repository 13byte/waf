services:
  # Nginx with ModSecurity and CRS
  nginx-waf:
    image: owasp/modsecurity-crs:nginx
    container_name: waf_test_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/templates/conf.d:/etc/nginx/templates/conf.d
      - ./logs/nginx:/var/log/nginx
    environment:
      - BACKEND=http://backend:8000
      - FRONTEND=http://frontend:3000
      - MODSEC_RULE_ENGINE=on
      - PARANOIA=1
    depends_on:
      - backend
      - frontend
    networks:
      - waf_network
    restart: unless-stopped

  # FastAPI Backend Service
  backend:
    build: ./backend
    container_name: waf_test_backend
    expose:
      - "8000"
    environment:
      - DB_HOST=database
      - DB_PORT=3306
      - DB_NAME=waf_test_db
      - DB_USER=waf_user
      - DB_PASSWORD=waf_pass123
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend:/app
    depends_on:
      - database
    networks:
      - waf_network
    restart: unless-stopped

  # React Frontend Service
  frontend:
    build: ./frontend
    container_name: waf_test_frontend
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - ORIGIN=http://localhost
    networks:
      - waf_network
    restart: unless-stopped

  # Database (MySQL)
  database:
    image: mysql:8.0
    container_name: waf_test_database
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: waf_test_db
      MYSQL_USER: waf_user
      MYSQL_PASSWORD: waf_pass123
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - ./db/config/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - waf_network
    restart: unless-stopped

networks:
  waf_network:
    driver: bridge

volumes:
  mysql_data:
